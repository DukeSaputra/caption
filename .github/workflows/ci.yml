name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  build-linux:
    name: Linux (x86_64-gnu)
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -qq && sudo apt-get install -y cmake
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p caption-core --no-default-features
      - run: cargo build --release --no-default-features
      - run: cp target/release/caption-cli caption && chmod +x caption
      - uses: actions/upload-artifact@v4
        with:
          name: caption-linux-x86_64
          path: caption

  build-macos:
    name: macOS (universal)
    needs: fmt
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p caption-core --no-default-features
      - run: cargo build --release --no-default-features --target x86_64-apple-darwin
      - run: cargo build --release --no-default-features --target aarch64-apple-darwin
      - name: Create universal binary
        run: |
          lipo -create -output caption \
            target/x86_64-apple-darwin/release/caption-cli \
            target/aarch64-apple-darwin/release/caption-cli
          chmod +x caption
      - uses: actions/upload-artifact@v4
        with:
          name: caption-macos-universal
          path: caption

  build-windows:
    name: Windows (x86_64-msvc)
    needs: fmt
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lukka/get-cmake@latest
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-no-parakeet
      - run: cargo build --release --target x86_64-pc-windows-msvc --no-default-features
      - run: copy target\x86_64-pc-windows-msvc\release\caption-cli.exe caption.exe
        shell: cmd
      - uses: actions/upload-artifact@v4
        with:
          name: caption-windows-x86_64
          path: caption.exe

  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package
        run: |
          cp artifacts/caption-linux-x86_64/caption caption-linux-x86_64
          chmod +x caption-linux-x86_64
          cp artifacts/caption-macos-universal/caption caption-macos-universal
          chmod +x caption-macos-universal
          cp artifacts/caption-windows-x86_64/caption.exe caption-windows-x86_64.exe
      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            caption-linux-x86_64
            caption-macos-universal
            caption-windows-x86_64.exe
